spring.application.name=RentCote

# ── Server Port ──
server.port=${PORT:8080}

# ── Supabase PostgreSQL (Session Pooler) ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?user=postgres.houzzwvwsaubglihbbzm&password=RentCote_2000}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.houzzwvwsaubglihbbzm}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:RentCote_2000}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── CORS Config Origin ──
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Upload directory ──
app.upload.dir=${APP_UPLOAD_DIR:uploads}
